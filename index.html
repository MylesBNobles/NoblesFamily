<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nobles Hunt">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Nobles Family Hunt</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── WELCOME SCREEN ──────────────────────────────────── -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="welcome-scroll">
      <div class="welcome-hero">
        <div class="mickey-wrap">
          <div class="mickey-ear ear-l"></div>
          <div class="mickey-ear ear-r"></div>
          <div class="mickey-face">✨</div>
        </div>
        <h1>Nobles Family<br>Hunt</h1>
        <p class="hero-sub">Singapore &amp; Disney Adventure</p>
        <p class="hero-date">✦ June 6 – 13, 2026 ✦</p>
        <div class="hero-pts-badge" id="total-pts-badge">1,800 pts total</div>
      </div>

      <p class="section-eyebrow">Who's playing?</p>
      <div id="player-list"></div>

      <div class="or-divider"><span>add new player</span></div>
      <div class="input-row">
        <input id="name-input" type="text" placeholder="Enter your name"
          maxlength="20" autocomplete="off" autocorrect="off"
          autocapitalize="words" spellcheck="false">
        <button id="join-btn" class="btn-join" aria-label="Join">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── APP SCREEN ─────────────────────────────────────── -->
  <div id="screen-app" class="screen">

    <header class="app-header">
      <button class="icon-btn" id="back-btn" aria-label="Back to players">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <span id="header-name" class="header-name">Player</span>
      <div class="score-chip">
        <span class="score-num" id="score-num">0</span>
        <span class="score-unit">pts</span>
      </div>
    </header>

    <div class="tab-body">

      <!-- Hunt tab -->
      <div id="tab-hunt" class="tab-pane active">
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="hunt-meta">
          <span><b id="meta-found">0</b> found</span>
          <span class="dot">·</span>
          <span><b id="meta-total">0</b> items</span>
          <span class="dot">·</span>
          <span><b id="meta-max">0</b> pts possible</span>
        </div>
        <div id="completion-slot"></div>
        <div id="hunt-list" class="hunt-list"></div>
      </div>

      <!-- Leaderboard tab -->
      <div id="tab-leaderboard" class="tab-pane">
        <div class="lb-hero">
          <div class="lb-trophy">🏆</div>
          <h2>Leaderboard</h2>
          <p>Players on this device</p>
        </div>
        <div id="lb-list" class="lb-list"></div>
      </div>

    </div>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="hunt">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
        </svg>
        <span>Hunt</span>
      </button>
      <button class="nav-btn" data-tab="leaderboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span>Scores</span>
      </button>
    </nav>

  </div>

  <canvas id="confetti" aria-hidden="true"></canvas>
  <script src="app.js"></script>
</body>
</html>
